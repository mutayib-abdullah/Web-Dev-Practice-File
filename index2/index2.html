<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms lets make it</title>
</head>

<body>
    <h1>Form to apply for web dev course</h1>
    <form action="post">
        <div>

            <label for="username">Enter your username</label>
            <input type="text" name="username" placeholder="enter your username" id="username"autofocus>

        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">female</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">subscribe to newsletter</label>
        </div>
        <div>
            <label for="comment">Enter your comment</label>
            <br>
            <textarea name="comment" id="comment" rows="4" cols="50">Enter something here</textarea>
        </div>
        <div>
            <select name="fruits">
                <option value="Apple">Apple</option>
                <option value="Mangoe">Mangoe</option>
                <option value="Banana">Banana</option>
            </select>
        </div>
    </form>

</body>

</html>
