<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Boxmodel</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            background-color: aqua;
            /* for both boxes */
        }
        .box1{
color: rgb(136, 13, 13);
padding: 10px;
margin: 35px; 
border:10px solid green;
height: 200px;
box-sizing: border-box;

        }
        .box2{
color: red;
margin: 25px; 
/* margin collapse: 35px will implement */
border:10px solid green;
height: 200px;
box-sizing: border-box;

        }
    </style>
</head>
<body>
    <div class="box box1">I am a box</div>
    <div class="box box2">I am an another box</div>
</body>
</html>
