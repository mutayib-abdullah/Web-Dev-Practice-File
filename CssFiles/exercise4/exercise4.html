<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --primary-color: rgb(115, 118, 122);
            --text-color: rgb(163, 198, 210);
            --secondary-color: rgb(42, 75, 107);
        }

        body {
            background-color: var(--secondary-color);
        }

        * {
            margin: -2px;
            padding: 3px;
            /* margin: 0;
            padding: 0; */
            font-family: 'Poppins', sans-serif;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px;
        }

        ul li {
            display: inline;
            font-weight: bolder;
            padding: 23px;
            list-style: none;
        }

        ul li a {
            background-color: var(--text-color);
            text-decoration: none;
            border-end-end-radius: 5px;

        }
    </style>
</head>

<body>

    <head>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">Address</a></li>
                <li><a href="/">Reference</a></li>
                <li><a href="/">More on</a></li>
            </ul>
        </nav>
    </head>
</body>

</html>
