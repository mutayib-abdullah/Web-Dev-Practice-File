<!DOCTYPE html>
<html>
<head>
    <title>Voting Eligibility Checker</title>
    <style>
        body{
            text-align:center;
            font-family:Arial;
            margin-top:100px;
            background-color: #7712a2;
        }

        input{
            padding:8px;
        }

        button{
            padding:8px 15px;
            margin-left:10px;
            background-color: #684d4d;
        }

        #result{
            margin-top:20px;
            font-size:22px;
        }
        input{
            background-color: #eea5a5;
           
        }
       
    </style>
</head>
<body>

    <h1>Voting Eligibility Checker</h1>

    <input type="number" id="age"  placeholder="Enter your age">

    <button onclick="checkAge()">Check</button>

    <p id="result"></p>

    <script>

        function checkAge(){

            let age = parseInt(
                document.getElementById("age").value
            );

            if(age >= 18){

                alert("You are eligible for voting");

                document.getElementById("result").innerHTML =
                "You are eligible for voting";

            }

            else if(age > 0 && age < 18){

                alert("You are not eligible for voting");

                document.getElementById("result").innerHTML =
                "You are not eligible for voting";

            }

            else{

                alert("Invalid age");

                document.getElementById("result").innerHTML =
                "Invalid age";

            }

        }

    </script>

</body>
</html>
