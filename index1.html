<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Image-->
    <title>Image,List and Tables in HTML</title>
</head>

<!--Tables-->

<body>
    <link rel="stylesheet" href="style1.css">
    <h1>Beautiful Moon Image</h1>
    <img width="230" height="230" src="image1.png" alt="Moon image">
    <table>
        <caption>Employee Details</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>
        <tr>
            <td>Harry</td>
            <td>Programmer</td>
            <td>Javascript</td>
        </tr>
        <tr>
            <td>Harry</td>
            <td rowspan="2">Programmer</td>

        </tr>
        <tr>
            <td>Sam</td>
            <td rowspan="2">Java</td>

        </tr>
        <tfoot>
            <td>Total</td>
            <td>20</td>
            <td>30</td>
        </tfoot>
    </table>
    <!-- Lists -->
    <ul>
        <li>Harry</li>
        <li>Sam</li>
        <li>Messy</li>
    </ul>
    <ul type="square">
        <!--Types in disc (by default), square and circle-->
        <li>Harry</li>
        <li>Sam</li>
        <li>Messy</li>
    </ul>

    <ol>
        <li type="I">Harry</li>
        <li type="i">Sam</li>
        <li type="A">Messy</li>
    </ol>
</body>

</html>
